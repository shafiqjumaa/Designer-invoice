<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة أعمال المصمم</title>
<link rel="manifest" id="manifestLink">
<meta name="theme-color" content="#6366f1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0a0e1a; --panel:#10162a; --panel2:#151c33; --border:rgba(255,255,255,.08);
  --text:#e7eaf3; --muted:#8891a8; --accent:#6366f1; --accent2:#818cf8;
  --green:#34d399; --greenBg:rgba(52,211,153,.15); --amber:#fbbf24; --amberBg:rgba(251,191,36,.15);
  --rose:#f87171; --roseBg:rgba(248,113,113,.15); --radius:16px;
  --shadow:0 4px 18px rgba(0,0,0,.35); --inputBg:#0d1326;
}
body.light{
  --bg:#eef0f6; --panel:#ffffff; --panel2:#f5f6fa; --border:rgba(20,20,40,.08);
  --text:#161a2c; --muted:#6b7280; --accent:#6366f1; --accent2:#4f46e5;
  --green:#0f9d6b; --greenBg:rgba(16,185,129,.12); --amber:#b45309; --amberBg:rgba(245,158,11,.14);
  --rose:#dc2626; --roseBg:rgba(239,68,68,.12);
  --shadow:0 4px 18px rgba(30,30,60,.08); --inputBg:#f7f8fc;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Tahoma','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s;}
.hidden{display:none!important;}
button{font-family:inherit;cursor:pointer;border:none;}
svg{display:block;}
input,select,textarea{font-family:inherit;background:var(--inputBg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text);width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2);}
label.lbl{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;}
.field{margin-bottom:14px;}
.btn{padding:10px 16px;border-radius:11px;font-weight:bold;font-size:13px;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-soft{background:var(--panel2);color:var(--text);border:1px solid var(--border);}
.btn-soft:hover{background:var(--border);}
.btn-danger{background:var(--roseBg);color:var(--rose);}
.btn-danger:hover{background:rgba(248,113,113,.25);}
.btn-success{background:var(--greenBg);color:var(--green);}
.btn-success:hover{background:rgba(52,211,153,.25);}
.btn-icon{padding:9px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:12px;border:1px solid var(--border);color:var(--text);background:var(--panel2);margin:3px;}
.chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent2);color:#fff;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.grid{display:grid;gap:14px;}
.g2{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(3,1fr);} .g4{grid-template-columns:repeat(4,1fr);} .g5{grid-template-columns:repeat(5,1fr);}
@media(max-width:700px){.g2,.g3,.g4,.g5{grid-template-columns:repeat(2,1fr);}}
.flex{display:flex;} .between{justify-content:space-between;} .center{align-items:center;} .wrap{flex-wrap:wrap;} .gap{gap:10px;}
.muted{color:var(--muted);} .small{font-size:12px;} .bold{font-weight:bold;}
.badge{font-size:11px;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.badge-green{background:var(--greenBg);color:var(--green);} .badge-amber{background:var(--amberBg);color:var(--amber);} .badge-grey{background:var(--panel2);color:var(--muted);border:1px solid var(--border);} .badge-rose{background:var(--roseBg);color:var(--rose);}
.icon-box{display:flex;align-items:center;justify-content:center;border-radius:12px;flex-shrink:0;}
.progress-track{height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .3s;}

/* layout */
#app{min-height:100vh;}
.landing-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 30% 20%,color-mix(in srgb, var(--accent) 12%, var(--bg)),var(--bg) 70%);}
.landing-box{max-width:420px;width:100%;text-align:center;}
.logo-circle{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;box-shadow:0 8px 20px rgba(99,102,241,.35);}
.option-btn{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;text-align:right;display:flex;gap:14px;align-items:center;margin-bottom:12px;box-shadow:var(--shadow);}
.option-btn:hover{border-color:var(--accent2);}

.admin-layout{display:flex;min-height:100vh;}
.sidebar{width:236px;background:var(--panel);border-left:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;flex-shrink:0;height:100vh;}
@media(max-width:700px){.sidebar{width:62px;}.sidebar .navlabel{display:none;}.sidebar .brand-sub{display:none;}}
.navlist{overflow-y:auto;flex:1;}
.navbtn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;color:var(--muted);background:transparent;width:100%;text-align:right;font-size:13.5px;margin-bottom:3px;position:relative;}
.navbtn:hover{background:var(--panel2);color:var(--text);}
.navbtn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.nav-badge{position:absolute;left:8px;top:8px;background:var(--rose);color:#fff;font-size:10px;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.main{flex:1;padding:24px;overflow-y:auto;max-height:100vh;}
.page-title{font-size:23px;font-weight:bold;margin-bottom:18px;}
.fab{position:fixed;bottom:24px;left:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(99,102,241,.45);z-index:30;}
.theme-fab{position:fixed;top:16px;left:16px;width:42px;height:42px;border-radius:50%;background:var(--panel);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:200;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:18px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px;}
.modal-box.wide{max-width:800px;}
.modal-box.narrow{max-width:440px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-head h2{margin:0;font-size:18px;}
.close-x{background:transparent;color:var(--muted);padding:6px;border-radius:8px;}
.close-x:hover{color:var(--text);background:var(--panel2);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:right;color:var(--muted);font-size:11px;padding:8px 6px;border-bottom:1px solid var(--border);}
td{padding:8px 6px;border-bottom:1px solid var(--border);}

.row-grid{display:grid;grid-template-columns:1fr 70px 100px 40px;gap:8px;align-items:center;margin-bottom:8px;}
.comp-grid{display:grid;grid-template-columns:1.6fr 60px 90px 1fr 36px 36px;gap:6px;align-items:center;margin-bottom:8px;}
@media(max-width:680px){.row-grid,.comp-grid{grid-template-columns:1fr;}}

.print-hide{}
@media print{
  body *{visibility:hidden!important;}
  #printArea, #printArea *{visibility:visible!important;}
  #printArea{position:fixed;top:0;left:0;width:100%;}
  .print-hide{display:none!important;}
}
.item-num{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0;}
.diff-pos{color:var(--green);} .diff-neg{color:var(--rose);}
details summary{cursor:pointer;list-style:none;}
details summary::-webkit-details-marker{display:none;}
.client-add-box{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:8px;}
.seg{display:inline-flex;background:var(--panel2);border-radius:12px;padding:4px;border:1px solid var(--border);flex-wrap:wrap;}
.seg button{padding:9px 16px;border-radius:9px;font-size:12.5px;color:var(--muted);background:transparent;}
.seg button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.contact-card{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
.banner{border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}

/* invoice / printable */
.invoice-paper{background:#ffffff;color:#1e2233;border-radius:18px;overflow:hidden;max-width:600px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.4);}
.invoice-head{background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;padding:28px 30px;}
.invoice-body{padding:26px 30px;}
.invoice-paper table th{color:#94a3b8;border-bottom:2px solid #eef0f6;font-size:11px;text-transform:uppercase;}
.invoice-paper table td{border-bottom:1px solid #f1f3f8;color:#1e2233;}
.invoice-paper table tr:nth-child(even) td{background:#fafbfe;}
.invoice-total-box{background:linear-gradient(135deg,#eef0ff,#f5f3ff);border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.invoice-foot-note{background:#f8fafc;border-radius:12px;padding:14px 16px;font-size:13px;color:#475569;white-space:pre-wrap;border:1px solid #eef0f6;}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-cell{min-height:64px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);padding:6px;font-size:11px;position:relative;}
.cal-cell.today{border-color:var(--accent2);}
.cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px;}
</style>
</head>

/* ===================== ITEM / BATCH CALC HELPERS ===================== */
function itemTotal(it){
  if(it.pricingMode==="detailed") return (it.components||[]).reduce((s,c)=>s+Number(c.qty||0)*Number(c.price||0),0);
  return Number(it.qty||1)*Number(it.price||0);
}
function itemPaidTotal(it){
  if(it.pricingMode==="detailed") return (it.components||[]).reduce((s,c)=>s+(c.paid?Number(c.qty||0)*Number(c.price||0):0),0);
  return it.paid? itemTotal(it):0;
}
function itemRealTotal(it){ return Number(it.realValue||0); }

function calcStats(){
  let profit=0, owed=0, active=0; const alerts=[];
  DB.batches.forEach(b=>{
    if(b.status==="مفتوح") active++;
    (b.items||[]).forEach(it=>{ const t=itemTotal(it); const p=itemPaidTotal(it); profit+=p; owed+=(t-p); });
  });
  DB.invoices.forEach(inv=>{
    if(inv.status!=="مدفوعة" && inv.dueDate){
      const days = Math.ceil((new Date(inv.dueDate)-new Date())/86400000);
      if(days<=3){ const total=(inv.items||[]).reduce((s,it)=>s+Number(it.qty||0)*Number(it.price||0),0); alerts.push({label:"فاتورة "+inv.number, client:inv.clientName||"بدون عميل", amount:total, days}); }
    }
  });
  DB.subscriptions.forEach(s=>{
    if(s.status==="نشط" && s.renewalDate){
      const days = Math.ceil((new Date(s.renewalDate)-new Date())/86400000);
      if(days<=7) alerts.push({label:"تجديد اشتراك "+s.name, client:clientName(s.clientId), amount:s.monthlyPrice, days});
    }
  });
  const pendingResponses = DB.responses.filter(r=>!r.converted).reduce((s,r)=>s+Number(r.estimatedValue||budgetValue(r.budget)||0),0);
  owed += pendingResponses;
  const totalExpenses = DB.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  return {profit, owed, active, alerts, pendingResponses, totalExpenses, netProfit: profit-totalExpenses};
}

function clientStats(){
  const map = {};
  function ensure(id){ if(!map[id]) map[id]={id, name:clientName(id), agreed:0, real:0, count:0}; return map[id]; }
  DB.batches.forEach(b=>{ const c=ensure(b.clientId||"none"); (b.items||[]).forEach(it=>{ c.agreed+=itemTotal(it); c.real+=itemRealTotal(it); c.count++; }); });
  return Object.values(map).map(c=>{ const ratio = c.real>0 ? c.agreed/c.real : 1; let level="green"; if(ratio<0.85) level="red"; else if(ratio<1) level="yellow"; return Object.assign(c,{level}); });
}

function initPWA(){
  try{
    const manifest = {
      name:"نظام إدارة أعمال المصمم", short_name:"المصمم", start_url:".", display:"standalone",
      background_color:"#0a0e1a", theme_color:"#6366f1",

    };
    const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
    document.getElementById("manifestLink").href = URL.createObjectURL(blob);
  }catch(e){}
  const swCode = `
    self.addEventListener('install', e=>{});
    self.addEventListener('fetch', e=>{});
  `;
  if("serviceWorker" in navigator && (location.protocol==="https:" || location.hostname==="localhost")){
    try{
      const swBlob = new Blob([swCode], {type:"text/javascript"});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
    }catch(e){}
  }
}

/* ===================== AUTO BACKUP (best-effort, only while app is open) ===================== */
function checkAutoBackup(){
  const today = todayStr();
  if(DB.settings.lastBackupDate !== today){
    const json = JSON.stringify(DB);
    DB.settings.lastBackupDate = today;
    DB.settings.backupHistory = DB.settings.backupHistory||[];
    DB.settings.backupHistory.unshift({date:today, sizeKB:Math.round(json.length/1024)});
    DB.settings.backupHistory = DB.settings.backupHistory.slice(0,30);
    saveDB();
  }
}

function pageWaitlist(){
  return `

  ${DB.waitlist.length===0? `<p class="muted small">القائمة فاضية حالياً.</p>` :
  DB.waitlist.slice().sort((a,b)=>(a.expectedStart||"").localeCompare(b.expectedStart||"")).map(w=>{
    const prioColor = {"عالية":"badge-rose","متوسطة":"badge-amber","منخفضة":"badge-grey"};
    return `<div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div><div class="bold small flex gap center">${esc(w.clientName)} <span class="badge ${prioColor[w.priority]}">${esc(w.priority)}</span></div>
      <div class="muted small">${esc(w.projectType)} · بدء متوقع: ${esc(w.expectedStart||"—")} ${w.meetingDate?(" · اجتماع: "+esc(w.meetingDate)):""}</div>
      ${w.notes? `<div class="muted small">${esc(w.notes)}</div>`:""}</div>
      <div class="flex gap"><button class="btn-icon btn-soft" onclick="App.openWaitModal('${w.id}')">${icon('edit',14)}</button><button class="btn-icon btn-danger" onclick="App.deleteWait('${w.id}')">${icon('trash',14)}</button></div>
    </div>`;
  }).join("")}
  `;
}
function renderCalendar(){
  const y=ST.calYear, m=ST.calMonth;
  const first = new Date(y,m,1); const startDay=first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const monthNames=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const events = {};
  DB.waitlist.forEach(w=>{ if(w.meetingDate){ const d=w.meetingDate.slice(0,10); (events[d]=events[d]||[]).push({c:"var(--accent2)",t:"اجتماع: "+w.clientName}); } if(w.expectedStart){ (events[w.expectedStart]=events[w.expectedStart]||[]).push({c:"var(--amber)",t:"بدء: "+w.clientName}); } });
  DB.subscriptions.forEach(s=>{ if(s.renewalDate) (events[s.renewalDate]=events[s.renewalDate]||[]).push({c:"var(--rose)",t:"تجديد: "+s.name}); });
  DB.invoices.forEach(inv=>{ if(inv.dueDate) (events[inv.dueDate]=events[inv.dueDate]||[]).push({c:"var(--green)",t:"استحقاق فاتورة: "+inv.number}); });
  const todayISO = todayStr();
  let cells="";
  for(let i=0;i<startDay;i++) cells+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const evs = events[iso]||[];
    cells += `<div class="cal-cell ${iso===todayISO?'today':''}"><div class="bold">${d}</div>${evs.slice(0,3).map(e=>`<span class="cal-dot" style="background:${e.c}" title="${esc(e.t)}"></span>`).join("")}</div>`;
  }
  return `<div class="card">
    <div class="flex between center" style="margin-bottom:12px;">
      <button class="btn-icon btn-soft" onclick="App.calNav(-1)">${icon('chevronRight',16)}</button>
      <span class="bold">${monthNames[m]} ${y}</span>
      <button class="btn-icon btn-soft" onclick="App.calNav(1)">${icon('chevronLeft',16)}</button>
    </div>
    <div class="cal-grid" style="margin-bottom:6px;">${["أحد","إثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"].map(d=>`<div class="muted small" style="text-align:center;">${d}</div>`).join("")}</div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

/* ---------- GOALS ---------- */
function pageGoals(){
  const key = monthKey();
  const g = DB.goals[key] || {income:0, projects:0, clients:0};
  const start = new Date(key+"-01");
  const end = new Date(start.getFullYear(), start.getMonth()+1, 1);
  let incomeAchieved=0; const clientSet=new Set(); let projectsAchieved=0;
  DB.batches.forEach(b=>{
    const created = b.startDate? new Date(b.startDate) : null;
    (b.items||[]).forEach(it=>{ incomeAchieved += itemPaidTotal(it); });
    if(created && created>=start && created<end){ projectsAchieved++; if(b.clientId) clientSet.add(b.clientId); }
  });
  const pct = (a,t)=> t>0? Math.min(100, Math.round(a/t*100)) : 0;
  return `
  <div class="flex between wrap" style="margin-bottom:20px;gap:10px;">
    <h1 class="page-title" style="margin:0;">أهدافي — ${key}</h1>

  </div>
  <div class="grid g3">
    ${goalCard("الدخل الشهري", incomeAchieved, g.income, "$")}
    ${goalCard("عدد المشاريع", projectsAchieved, g.projects, "")}
    ${goalCard("عدد العملاء الجدد/النشطين", clientSet.size, g.clients, "")}

function goalCard(label, achieved, target, prefix){
  const pct = target>0? Math.min(100, Math.round(achieved/target*100)) : 0;
  return `<div class="card">
    <div class="muted small" style="margin-bottom:6px;">${label}</div>
    <div class="flex between" style="margin-bottom:8px;"><span class="bold" style="font-size:20px;">${prefix}${fmt(achieved)}</span><span class="muted small">الهدف: ${prefix}${fmt(target)}</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
    <div class="small muted" style="margin-top:6px;">${pct}%</div>
  </div>`;
}

/* ===================== APP CONTROLLER ===================== */
const App = {
  toggleTheme(){ const isLight = document.body.classList.toggle("light"); updateThemeBtn(); },
  goLanding(){ ST.screen="landing"; ST.pinInput=""; ST.pinError=""; render(); },
  goLogin(){ ST.screen="login"; ST.pinInput=""; ST.pinError=""; render(); setTimeout(()=>document.getElementById("pinField")?.focus(),50); },
  goClient(){ ST.screen="client"; ST.surveyDraft=emptySurvey(); ST.surveySubmitted=false; render(); },
  lock(){ ST.screen="landing"; ST.adminPage="dashboard"; render(); },
  setPin(v){ ST.pinInput=v; },
  togglePinShow(){ ST.pinShow=!ST.pinShow; render(); setTimeout(()=>document.getElementById("pinField")?.focus(),0); },
  tryLogin(){
    if(ST.pinInput===PASSWORD){ ST.screen="admin"; ST.adminPage="dashboard"; ST.pinError=""; checkAutoBackup(); render(); }
    else { ST.pinError="كلمة السر غير صحيحة"; render(); }
  },
  setAdminPage(p){ ST.adminPage=p; ST.openBatchId=null; render(); },
  openBatch(id){ ST.openBatchId=id; render(); },
  backToWorks(){ ST.openBatchId=null; render(); },
  calNav(dir){ ST.calMonth += dir; if(ST.calMonth>11){ST.calMonth=0;ST.calYear++;} if(ST.calMonth<0){ST.calMonth=11;ST.calYear--;} render(); },

  // survey
  surveySet(field, val){ ST.surveyDraft[field]=val; render(); },
  surveyToggleArr(field, val, max){ const arr=ST.surveyDraft[field]; if(arr.includes(val)) ST.surveyDraft[field]=arr.filter(x=>x!==val); else if(!max||arr.length<max) ST.surveyDraft[field]=[...arr,val]; render(); },
  submitSurvey(){ const s=ST.surveyDraft; s.estimatedValue=budgetValue(s.budget); DB.responses.push(Object.assign({},s,{id:uid(),createdAt:Date.now()})); saveDB(); ST.surveySubmitted=true; render(); },

  // generic SILENT update (no re-render -> fixes number-typing bug)
  modalUpdateSilent(field, value, numeric){ if(!ST.modal) return; ST.modal.data[field] = numeric? Number(value): value; App.refreshSummaries(); },
  // generic update WITH re-render (only for structural/chip/toggle changes)
  modalUpdate(field, value, numeric){ if(!ST.modal) return; ST.modal.data[field] = numeric? Number(value): value; renderModal(); },
  refreshSummaries(){
    if(!ST.modal) return;
    if(ST.modal.type==="item"){ const el=document.getElementById("itemSummaryLine"); if(el) el.textContent=itemSummaryText(ST.modal.data); }
  },

  // clients
  deleteClientConfirm(id){ if(!confirm("حذف هذا العميل؟ لن تُحذف أعماله المرتبطة.")) return; DB.clients=DB.clients.filter(c=>c.id!==id); saveDB(); render(); },
  openClientModal(id){
    let data;
    if(id){ data = JSON.parse(JSON.stringify(DB.clients.find(c=>c.id===id))); data._isNew=false; }
    else { data = { id:uid(), type:"individual", name:"", phones:[newPhone("")], locationType:"", governorate:"", otherLocation:"", companyName:"", contacts:[], notes:"", _isNew:true }; }
    ST.modal = {type:"client", data}; renderModal();
  },
  modalSetClientType(type){ const d=ST.modal.data; d.type=type; if(type==="company"&&!(d.contacts&&d.contacts.length)) d.contacts=[{id:uid(),name:"",phones:[newPhone("")]}]; if(type==="individual"&&!(d.phones&&d.phones.length)) d.phones=[newPhone("")]; renderModal(); },
  modalSetLocationType(t){ ST.modal.data.locationType=t; renderModal(); },
  modalAddPhone(scope){ const d=ST.modal.data; if(scope==="client"){ d.phones=d.phones||[]; d.phones.push(newPhone("")); } else { const cid=scope.split(":")[1]; const c=d.contacts.find(x=>x.id===cid); c.phones=c.phones||[]; c.phones.push(newPhone("")); } renderModal(); },
  modalRemovePhone(scope, phoneId){ const d=ST.modal.data; if(scope==="client"){ d.phones=d.phones.filter(p=>p.id!==phoneId); } else { const cid=scope.split(":")[1]; const c=d.contacts.find(x=>x.id===cid); c.phones=c.phones.filter(p=>p.id!==phoneId); } renderModal(); },
  modalSetPhone(scope, phoneId, val){ const d=ST.modal.data; let phone; if(scope==="client"){ phone=d.phones.find(p=>p.id===phoneId); } else { const cid=scope.split(":")[1]; const c=d.contacts.find(x=>x.id===cid); phone=c.phones.find(p=>p.id===phoneId); } if(phone) phone.number=val; },
  modalAddContact(){ ST.modal.data.contacts.push({id:uid(), name:"", phones:[newPhone("")]}); renderModal(); },
  modalRemoveContact(cid){ ST.modal.data.contacts = ST.modal.data.contacts.filter(c=>c.id!==cid); renderModal(); },
  modalSetContactName(cid, val){ const c=ST.modal.data.contacts.find(x=>x.id===cid); if(c) c.name=val; },
  saveClient(){
    const d = ST.modal.data;
    if(d.type==="individual" && !d.name.trim()) return alert("الرجاء كتابة اسم العميل");
    if(d.type==="company" && !d.companyName.trim()) return alert("الرجاء كتابة اسم الشركة/المؤسسة");
    const clean = JSON.parse(JSON.stringify(d)); delete clean._isNew;
    const idx = DB.clients.findIndex(c=>c.id===clean.id);
    if(idx>=0) DB.clients[idx]=clean; else DB.clients.push(clean);
    saveDB(); App.closeModal(); render();
  },

  // responses
  deleteResponse(id){ if(!confirm("حذف هذا الرد؟")) return; DB.responses=DB.responses.filter(r=>r.id!==id); saveDB(); render(); },
  convertResponse(id){
    const r = DB.responses.find(x=>x.id===id); if(!r) return;
    let cid = DB.clients.find(c=>c.type==="individual" && r.whatsapp && (c.phones||[]).some(p=>p.number===r.whatsapp))?.id;

  removeComponent(cid){ ST.modal.data.components = ST.modal.data.components.filter(c=>c.id!==cid); renderModal(); App.refreshSummaries(); },
  compUpdate(cid, field, val, numeric){

  saveWait(){ const d=ST.modal.data; if(!d.clientName.trim()) return alert("الرجاء كتابة اسم العميل"); const idx=DB.waitlist.findIndex(w=>w.id===d.id); if(idx>=0) DB.waitlist[idx]=d; else DB.waitlist.push(d); saveDB(); App.closeModal(); render(); },

  nextContractNumber(){ return `CNT-${String(DB.contracts.length+1).padStart(4,"0")}`; },

  invoiceFromBatch(bid){

    (b.items||[]).forEach((it,idx)=>{
      if(it.pricingMode==="detailed"){ (it.components||[]).forEach(c=>items.push({id:uid(), desc:`${it.title||it.type} - ${c.name}`, qty:Number(c.qty||1), price:Number(c.price||0)})); }
      else items.push({id:uid(), desc:`${idx+1}. ${it.title||(it.type==='أخرى'?it.customType:it.type)}`, qty:Number(it.qty||1), price:Number(it.price||0)});
    });
    App.openInvoiceModal(null, {clientId:b.clientId, clientName:clientName(b.clientId), clientEmail:clientContact(b.clientId), items: items.length?items:[{id:uid(),desc:"",qty:1,price:0}], notes:DB.settings.paymentNote});

  addInvoiceItemRow(){ ST.modal.data.items.push({id:uid(), desc:"", qty:1, price:0}); renderModal(); },

  refreshInvoiceTotal(){ const total=(ST.modal.data.items||[]).reduce((s,it)=>s+Number(it.qty||0)*Number(it.price||0),0); const el=document.getElementById("invTotalLine"); if(el) el.textContent="الإجمالي: $"+fmt(total); },
  importIntoInvoice(){
    const sel=document.getElementById("importSelect").value; if(!sel) return;
    const b=DB.batches.find(x=>x.id===sel); if(!b) return;
    const inv=ST.modal.data;

    (b.items||[]).forEach((it,idx)=>{
      if(it.pricingMode==="detailed"){ (it.components||[]).forEach(c=>newItems.push({id:uid(), desc:`${it.title||it.type} - ${c.name}`, qty:Number(c.qty||1), price:Number(c.price||0)})); }
      else newItems.push({id:uid(), desc:`${idx+1}. ${it.title||(it.type==='أخرى'?it.customType:it.type)}`, qty:Number(it.qty||1), price:Number(it.price||0)});

    const idx=DB.invoices.findIndex(i=>i.id===d.id);
    const clean={id:d.id, number:d.number, date:d.date, dueDate:d.dueDate, clientId:d.clientId, clientName:d.clientName, clientEmail:d.clientEmail, items:d.items, notes:d.notes, status:d.status, createdAt:d.createdAt||Date.now()};

  viewInvoice(id){ const inv=DB.invoices.find(i=>i.id===id); if(!inv) return; ST.modal={type:"invoiceView", data:inv}; renderModal(); },
  copyInvoiceText(){
    const inv=ST.modal.data; const total=(inv.items||[]).reduce((s,it)=>s+Number(it.qty||0)*Number(it.price||0),0);
    let t=`فاتورة ${inv.number}\nمن: ${DB.settings.businessName||"-"}${DB.settings.businessContact?(" ("+DB.settings.businessContact+")"):""}\nإلى: ${inv.clientName||"-"}\nالتاريخ: ${inv.date}${inv.dueDate?(" | الاستحقاق: "+inv.dueDate):""}\n\n`;
    (inv.items||[]).forEach(it=>{ t+=`- ${it.desc} × ${it.qty} = $${fmt(Number(it.qty||0)*Number(it.price||0))}\n`; });
    t+=`\nالإجمالي: $${fmt(total)}\n`; if(inv.notes) t+=`\n${inv.notes}\n`;

  },

  // SETTINGS
  setSetting(field, val){ DB.settings[field]=val; saveDB(); },
  exportBackup(){
    const json = JSON.stringify(DB, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`designer-backup-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url);
    DB.settings.lastBackupDate = todayStr();
    DB.settings.backupHistory = DB.settings.backupHistory||[];

    saveDB(); render();
  },

  closeModal(){ ST.modal=null; renderModal(); }
};

/* build a fully standalone, offline-capable HTML file for client-side contract signing */
function buildStandaloneSignHtml(contract, businessName){
  const itemsStr = (contract.items||[]).join("، ");
  const cnum = esc(contract.number);
  const termsHtml = contract.terms ? "<p><b>الشروط:</b><br>" + esc(contract.terms) + "</p>" : "";
  const S = "script";
  return "<!DOCTYPE html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"UTF-8\">" +
  "<title>توقيع العقد " + cnum + "</title>" +
  "<style>body{font-family:Tahoma,Arial,sans-serif;background:#f1f2f6;margin:0;padding:24px;color:#1e2233;}" +
  ".box{max-width:520px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.1);}" +
  "h2{margin-top:0;} canvas{border:2px dashed #c7cad6;border-radius:10px;width:100%;touch-action:none;background:#fafbfe;}" +
  "button{background:#6366f1;color:#fff;border:none;padding:12px 18px;border-radius:10px;font-weight:bold;cursor:pointer;width:100%;margin-top:10px;}" +
  ".soft{background:#eef0f6;color:#1e2233;}" +
  "input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-top:6px;}" +
  "</style></head><body>" +
  "<div class=\"box\">" +
  "<h2>عقد تصميم — " + cnum + "</h2>" +
  "<p><b>من:</b> " + esc(businessName||"-") + "</p>" +
  "<p><b>نوع المشروع:</b> " + esc(contract.projectType) + "</p>" +
  "<p><b>عناصر المشروع:</b> " + (esc(itemsStr)||"—") + "</p>" +
  "<p><b>السعر:</b> $" + fmt(contract.price) + " &nbsp; <b>مدة التنفيذ:</b> " + esc(contract.duration||"—") + " &nbsp; <b>عدد التعديلات:</b> " + (contract.revisions||0) + "</p>" +
  termsHtml +
  "<hr>" +
  "<p>اكتب اسمك ووقّع بالأسفل، ثم اضغط \"تنزيل التوقيع\" وأرسل الصورة الناتجة للمصمم.</p>" +
  "<input id=\"nm\" placeholder=\"اسمك الكامل\">" +
  "<canvas id=\"pad\" height=\"150\"></canvas>" +
  "<button class=\"soft\" onclick=\"clearPad()\">مسح التوقيع</button>" +
  "<button onclick=\"downloadSign()\">تنزيل التوقيع كصورة</button>" +
  "</div>" +
  "<" + S + ">" +
  "const canvas=document.getElementById('pad'); const ctx=canvas.getContext('2d');" +
  "function resize(){ canvas.width=canvas.clientWidth; canvas.height=150; }" +
  "resize(); window.addEventListener('resize',resize);" +
  "let drawing=false;" +
  "function pos(e){ const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left, y:t.clientY-r.top}; }" +
  "function start(e){ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }" +
  "function move(e){ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e2233'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke(); e.preventDefault(); }" +
  "function end(){ drawing=false; }" +
  "canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);" +
  "canvas.addEventListener('touchstart',start); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',end);" +
  "function clearPad(){ ctx.clearRect(0,0,canvas.width,canvas.height); }" +
  "function downloadSign(){" +
  "  const out=document.createElement('canvas'); out.width=600; out.height=400;" +
  "  const octx=out.getContext('2d'); octx.fillStyle='#fff'; octx.fillRect(0,0,600,400);" +
  "  octx.fillStyle='#1e2233'; octx.font='bold 18px Tahoma'; octx.textAlign='right'; octx.direction='rtl';" +
  "  octx.fillText('عقد " + cnum + " — إثبات توقيع', 580, 30);" +
  "  octx.font='13px Tahoma';" +
  "  octx.fillText('الاسم: '+(document.getElementById('nm').value||'-'), 580, 60);" +
  "  octx.fillText('التاريخ: '+new Date().toLocaleDateString(), 580, 82);" +
  "  octx.drawImage(canvas, 20, 100, 560, 150);" +
  "  octx.strokeStyle='#c7cad6'; octx.strokeRect(20,100,560,150);" +
  "  octx.fillText('بالتوقيع أعلاه، أوافق على شروط هذا العقد.', 580, 280);" +
  "  const a=document.createElement('a'); a.download='توقيع-" + cnum + ".png'; a.href=out.toDataURL('image/png'); a.click();" +
  "}" +
  "</" + S + "></body></html>";
}

document.getElementById("importFileInput").addEventListener("change", function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!confirm("سيتم استبدال جميع بياناتك الحالية. هل تريد الاستمرار؟")) return;
      DB=Object.assign(defaultDB(), parsed); saveDB(); render(); alert("تم الاستيراد بنجاح");
    }catch(err){ alert("ملف غير صالح."); }
  };
  reader.readAsText(file); e.target.value="";
});
document.getElementById("signFileInput").addEventListener("change", function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){ App.saveSignedFile(ev.target.result); };
  reader.readAsDataURL(file); e.target.value="";
});

initTheme();
initPWA();
render();
